<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="none" stroke="#30363d" stroke-width="4"/>
  <!-- Chart line -->
  <polyline points="200,700 340,580 440,620 540,420 640,480 740,280 840,180"
    fill="none" stroke="url(#line)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow dot at peak -->
  <circle cx="840" cy="180" r="36" fill="#10b981"/>
  <circle cx="840" cy="180" r="56" fill="#10b981" opacity="0.25"/>
  <!-- W letter subtle -->
  <text x="512" y="900" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif"
    font-size="140" font-weight="800" fill="#e6edf3" opacity="0.6">WILDTRADE</text>
</svg>
